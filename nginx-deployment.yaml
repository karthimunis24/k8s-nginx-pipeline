apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-nginx
  template:
    metadata:
      labels:
        app: custom-nginx
    spec:
      containers:
      - name: custom-nginx
        image: custom-nginx:latest
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: custom-nginx
spec:
  type: NodePort
  selector:
    app: custom-nginx
  ports:
  - port: 80
    targetPort: 80
